<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת התרעה LoRa - WebUSB</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: sans-serif; transition: background 0.5s; 
            background-color: #2c3e50; color: white; text-align: center;
        }
        #status-text { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; }
        button { 
            padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; 
            border: none; background: white; color: #2c3e50;
        }
    </style>
</head>
<body>

    <div id="status-text">ממתין לחיבור LoRa (WebUSB)...</div>
    <button id="connectBtn">התחבר למקלט</button>

    <script src="https://cdn.jsdelivr.net/gh/wtakuo/webusb-serial@master/webusb-serial.js"></script>

    <script>
        const statusText = document.getElementById('status-text');
        const connectBtn = document.getElementById('connectBtn');
        const body = document.body;

        // הגדרת חיבור ה-Serial דרך USB
        const serial = new WebUSBSerial();

        connectBtn.addEventListener('click', async () => {
            try {
                // בקשת מכשיר USB מהמשתמש
                await serial.connect();
                
                statusText.innerText = "מחובר - שגרה";
                body.style.backgroundColor = "#27ae60";
                connectBtn.style.display = 'none';

                // לופ קריאת נתונים
                serial.on('data', (data) => {
                    const decoder = new TextDecoder();
                    const code = decoder.decode(data).trim();
                    if (code) handleSignal(code);
                });

            } catch (err) {
                statusText.innerText = "שגיאה: " + err.message;
                console.error(err);
            }
        });

        function handleSignal(code) {
            console.log("קוד שהתקבל:", code);
            if (code.includes('2')) {
                body.style.backgroundColor = "#c0392b";
                statusText.innerText = "אזעקה!";
            } else if (code.includes('1')) {
                body.style.backgroundColor = "#f39c12";
                statusText.innerText = "התרעה צפויה";
            } else if (code.includes('0') || code.includes('3')) {
                body.style.backgroundColor = "#27ae60";
                statusText.innerText = "שגרה";
            }
        }
    </script>
</body>
</html>
