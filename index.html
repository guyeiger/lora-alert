<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRa Monitor - Native</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: sans-serif; transition: background 0.5s; 
            background-color: #2c3e50; color: white; text-align: center;
        }
        #status-text { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; }
        button { 
            padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; 
            border: none; background: white; color: #2c3e50;
        }
    </style>
</head>
<body>

    <div id="status-text">ממתין לחיבור USB...</div>
    <button id="connectBtn">התחבר למקלט</button>

    <script>
        const statusText = document.getElementById('status-text');
        const connectBtn = document.getElementById('connectBtn');
        const body = document.body;

        connectBtn.addEventListener('click', async () => {
            try {
                // בדיקה אם הדפדפן תומך ב-USB
                if (!navigator.usb) {
                    statusText.innerText = "הדפדפן שלך לא תומך ב-USB";
                    return;
                }

                // בקשת מכשיר
                const device = await navigator.usb.requestDevice({ filters: [] });
                
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                statusText.innerText = "מחובר למכשיר!";
                body.style.backgroundColor = "#27ae60";
                connectBtn.style.display = 'none';

                // כאן אנחנו רק בודקים זיהוי ראשוני
                console.log("Device connected:", device.productName);

            } catch (err) {
                statusText.innerText = "שגיאה: " + err.message;
                console.error(err);
            }
        });
    </script>
</body>
</html>
