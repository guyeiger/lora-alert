<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRa Debug Mode</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background-color: #2c3e50; color: white; text-align: center; }
        #status-text { font-size: 2.5rem; font-weight: bold; }
        #raw-data { margin-top: 20px; font-family: monospace; background: black; color: #0f0; padding: 15px; width: 80%; overflow-wrap: break-word; }
        button { padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; border: none; background: white; color: #2c3e50; }
    </style>
</head>
<body>
    <div id="status-text">ממתין לנתונים...</div>
    <button id="connectBtn">התחבר למקלט</button>
    <div id="raw-data">ממתין לבייטים גולמיים...</div>

    <script>
        const statusText = document.getElementById('status-text');
        const rawDataDiv = document.getElementById('raw-data');
        const connectBtn = document.getElementById('connectBtn');

        connectBtn.addEventListener('click', async () => {
            try {
                const device = await navigator.usb.requestDevice({ filters: [] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                statusText.innerText = "מחובר! שלח '2' מהמחשב...";
                connectBtn.style.display = 'none';

                const endpoint = 2; 
                while (true) {
                    const result = await device.transferIn(endpoint, 64);
                    const bytes = new Uint8Array(result.data.buffer);
                    
                    // מציג את רשימת המספרים שהתקבלו (למשל: 50, 13, 10)
                    rawDataDiv.innerText = "התקבלו בייטים: " + Array.from(bytes).join(", ");
                    
                    // בדיקה אם אחד מהבייטים הוא 50 (הקוד של '2')
                    if (Array.from(bytes).includes(50)) {
                        document.body.style.backgroundColor = "red";
                        statusText.innerText = "אזעקה!";
                    }
                }
            } catch (err) {
                statusText.innerText = "שגיאה: " + err.message;
            }
        });
    </script>
</body>
</html>
