<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoRa Alert Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: system-ui, -apple-system, sans-serif; 
            transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            background-color: #2c3e50; color: white; text-align: center; overflow: hidden;
        }
        #status-text { font-size: 3.5rem; font-weight: 900; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #sub-text { font-size: 1.2rem; margin-top: 10px; opacity: 0.8; }
        
        .controls { position: fixed; bottom: 50px; display: flex; flex-direction: column; gap: 15px; width: 80%; }
        
        button { 
            padding: 20px; font-size: 1.3rem; cursor: pointer; border-radius: 15px; 
            border: none; background: white; color: #2c3e50; font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: all 0.2s;
        }
        button:active { transform: scale(0.95); }
        
        #installBtn { background: #f1c40f; color: #000; display: none; } /* כפתור התקנה סמוי שיופיע רק כשמוכן */
    </style>
</head>
<body>

    <div id="display">
        <div id="status-text">ממתין לחיבור</div>
        <div id="sub-text">חבר את מקלט ה-LoRa ל-USB</div>
    </div>

    <div class="controls">
        <button id="installBtn">📥 התקן כאפליקציה למסך הבית</button>
        <button id="connectBtn">🔌 התחבר למקלט</button>
    </div>

    <script>
        const body = document.body;
        const statusText = document.getElementById('status-text');
        const subText = document.getElementById('sub-text');
        const connectBtn = document.getElementById('connectBtn');
        const installBtn = document.getElementById('installBtn');

        // --- 1. רישום ה-Service Worker ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("SW Active"))
                .catch(err => console.error("SW Fail", err));
        }

        // --- 2. לוגיקת התקנה (PWA) ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block'; // מציג את כפתור ההתקנה רק כשהדפדפן מאשר
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // --- 3. תקשורת USB ---
        connectBtn.addEventListener('click', async () => {
            try {
                const device = await navigator.usb.requestDevice({ filters: [] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                connectBtn.style.display = 'none';
                updateUI('0'); 
                readLoop(device);
            } catch (err) {
                subText.innerText = "שגיאה: " + err.message;
            }
        });

        async function readLoop(device) {
            const endpoint = 2; 
            while (true) {
                try {
                    const result = await device.transferIn(endpoint, 64);
                    const bytes = Array.from(new Uint8Array(result.data.buffer));
                    
                    // המילון שפיצחנו יחד
                    if (bytes.includes(24)) updateUI('2');      // אזעקה
                    else if (bytes.includes(6)) updateUI('1');  // התרעה
                    else if (bytes.includes(30)) updateUI('3'); // סיום
                    else if (bytes.includes(0)) updateUI('0');  // שגרה
                } catch (err) {
                    statusText.innerText = "החיבור נותק";
                    connectBtn.style.display = 'block';
                    break;
                }
            }
        }

        function updateUI(state) {
            const states = {
                '2': { bg: '#c0392b', txt: 'אזעקה!', sub: 'היכנס למרחב מוגן' },
                '1': { bg: '#d35400', txt: 'התרעה צפויה', sub: 'הישאר ליד ממ"ד' },
                '3': { bg: '#2980b9', txt: 'חזרה לשגרה', sub: 'ניתן לצאת' },
                '0': { bg: '#27ae60', txt: 'שגרה', sub: 'המערכת סורקת' }
            };
            const config = states[state];
            body.style.backgroundColor = config.bg;
            statusText.innerText = config.txt;
            subText.innerText = config.sub;
        }
    </script>
</body>
</html>
