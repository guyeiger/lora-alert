<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRa Alert - Live</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: sans-serif; transition: background 0.5s; 
            background-color: #2c3e50; color: white; text-align: center;
        }
        #status-text { font-size: 3rem; font-weight: bold; }
        button { padding: 20px 50px; font-size: 1.5rem; cursor: pointer; border-radius: 50px; border: none; background: white; color: #2c3e50; }
    </style>
</head>
<body>

    <div id="status-text">ממתין לחיבור...</div>
    <button id="connectBtn">התחבר למקלט</button>

    <script>
        const statusText = document.getElementById('status-text');
        const connectBtn = document.getElementById('connectBtn');
        const body = document.body;

        connectBtn.addEventListener('click', async () => {
            try {
                const device = await navigator.usb.requestDevice({ filters: [] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                statusText.innerText = "מחובר - שגרה";
                body.style.backgroundColor = "#27ae60";
                connectBtn.style.display = 'none';

                startReading(device);
            } catch (err) {
                statusText.innerText = "שגיאה: " + err.message;
            }
        });

        async function startReading(device) {
            const endpoint = 2; // הצינור שמצאנו!
            while (true) {
                try {
                    const result = await device.transferIn(endpoint, 64);
                    // הופכים את הבייטים למערך של מספרים כדי שיהיה קל לקרוא
                    const dataArray = Array.from(new Uint8Array(result.data.buffer));
                    
                    // מחפשים את הערך האסקי של הספרות (48 זה '0', 50 זה '2')
                    if (dataArray.includes(50)) handleSignal('2');
                    else if (dataArray.includes(49)) handleSignal('1');
                    else if (dataArray.includes(48) || dataArray.includes(51)) handleSignal('0');
                    
                } catch (err) {
                    console.error(err);
                    break;
                }
            }
        }

        function handleSignal(code) {
            if (code === '2') {
                body.style.backgroundColor = "#c0392b";
                statusText.innerText = "אזעקה!";
            } else if (code === '1') {
                body.style.backgroundColor = "#f39c12";
                statusText.innerText = "התרעה צפויה";
            } else if (code === '0') {
                body.style.backgroundColor = "#27ae60";
                statusText.innerText = "שגרה";
            }
        }
    </script>
</body>
</html>
