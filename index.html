<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRa Alert System</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: sans-serif; transition: background 0.8s; 
            background-color: #2c3e50; color: white; text-align: center;
        }
        #status-text { font-size: 3rem; font-weight: bold; margin: 20px; }
        #log { font-family: monospace; font-size: 0.9.rem; opacity: 0.6; margin-top: 20px; }
        button { 
            padding: 20px 50px; font-size: 1.5rem; cursor: pointer; border-radius: 50px; 
            border: none; background: white; color: #2c3e50; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="status-text">ממתין לחיבור...</div>
    <button id="connectBtn">התחבר למקלט</button>
    <div id="log"></div>

    <script>
        const statusText = document.getElementById('status-text');
        const connectBtn = document.getElementById('connectBtn');
        const logDiv = document.getElementById('log');
        const body = document.body;

        connectBtn.addEventListener('click', async () => {
            try {
                const device = await navigator.usb.requestDevice({ filters: [] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                // הגדרת ה-Baud Rate ל-9600 (שליחת פקודות שליטה לצ'יפ ה-USB)
                await device.controlTransferOut({
                    requestType: 'class', recipient: 'interface', request: 0x22, value: 0x01, index: 0x00
                });
                await device.controlTransferOut({
                    requestType: 'class', recipient: 'interface', request: 0x20, value: 0x00, index: 0x00,
                    data: new Uint8Array([0x80, 0x25, 0x00, 0x00, 0x00, 0x00, 0x08])
                });

                statusText.innerText = "מחובר - שגרה";
                body.style.backgroundColor = "#27ae60";
                connectBtn.style.display = 'none';

                readLoop(device);
            } catch (err) {
                statusText.innerText = "שגיאה: " + err.message;
            }
        });

        async function readLoop(device) {
            const endpoint = 1; // נקודת הקצה לקריאה ברוב צ'יפי ה-USB
            while (true) {
                try {
                    const result = await device.transferIn(endpoint, 64);
                    const decoder = new TextDecoder();
                    const text = decoder.decode(result.data).trim();
                    
                    if (text) {
                        logDiv.innerText = "נתקבל לאחרונה: " + text;
                        handleSignal(text);
                    }
                } catch (err) {
                    console.error("Read error:", err);
                    break;
                }
            }
        }

        function handleSignal(code) {
            if (code.includes('2')) {
                body.style.backgroundColor = "#c0392b"; // אדום
                statusText.innerText = "אזעקה!";
            } else if (code.includes('1')) {
                body.style.backgroundColor = "#f39c12"; // כתום
                statusText.innerText = "התרעה צפויה";
            } else if (code.includes('0') || code.includes('3')) {
                body.style.backgroundColor = "#27ae60"; // ירוק
                statusText.innerText = "שגרה";
            }
        }
    </script>
</body>
</html>
