<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRa Alert - Final</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: sans-serif; transition: background 0.5s; 
            background-color: #2c3e50; color: white; text-align: center;
        }
        #status-text { font-size: 3rem; font-weight: bold; }
        button { padding: 20px 50px; font-size: 1.5rem; cursor: pointer; border-radius: 50px; border: none; background: white; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status-text">ממתין לחיבור...</div>
    <button id="connectBtn">התחבר למקלט</button>

    <script>
        const statusText = document.getElementById('status-text');
        const connectBtn = document.getElementById('connectBtn');
        const body = document.body;

        connectBtn.addEventListener('click', async () => {
            try {
                const device = await navigator.usb.requestDevice({ filters: [] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                statusText.innerText = "מחובר - שגרה";
                body.style.backgroundColor = "#27ae60";
                connectBtn.style.display = 'none';

                startReading(device);
            } catch (err) {
                statusText.innerText = "שגיאה: " + err.message;
            }
        });

        async function startReading(device) {
            const endpoint = 2; 
            while (true) {
                try {
                    const result = await device.transferIn(endpoint, 64);
                    const bytes = Array.from(new Uint8Array(result.data.buffer));
                    
                    // זיהוי הקודים לפי מה שגילינו בשטח
                    if (bytes.includes(248) || bytes.includes(24)) {
                        handleSignal('2'); // אזעקה
                    } 
                    // (אם תרצה לזהות גם 0 או 1, נצטרך לראות מה הביטים שלהם, כרגע נתמקד ב-2)
                } catch (err) {
                    break;
                }
            }
        }

        function handleSignal(code) {
            if (code === '2') {
                body.style.backgroundColor = "#c0392b"; // אדום
                statusText.innerText = "אזעקה!";
                // כאן נוכל להוסיף בעתיד את השמע
            } else {
                body.style.backgroundColor = "#27ae60"; // ירוק
                statusText.innerText = "שגרה";
            }
        }
    </script>
</body>
</html>
