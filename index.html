<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRa Protocol Debug</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: sans-serif; background-color: #2c3e50; color: white; text-align: center;
        }
        #status-text { font-size: 2rem; font-weight: bold; margin-bottom: 20px; }
        #debug-box { 
            background: #000; color: #0f0; padding: 20px; border-radius: 10 herbs; 
            font-family: monospace; width: 80%; font-size: 1.2rem; border: 2px solid #333;
        }
        .label { color: #aaa; font-size: 0.9rem; margin-top: 10px; }
        button { padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; border: none; background: white; color: #2c3e50; }
    </style>
</head>
<body>

    <div id="status-text">מצב אבחון פרוטוקול</div>
    <button id="connectBtn">התחבר למקלט</button>
    
    <div class="label">מספרים שמתקבלים כרגע מה-USB:</div>
    <div id="debug-box">ממתין לנתונים...</div>

    <script>
        const debugBox = document.getElementById('debug-box');
        const connectBtn = document.getElementById('connectBtn');

        connectBtn.addEventListener('click', async () => {
            try {
                const device = await navigator.usb.requestDevice({ filters: [] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                document.getElementById('status-text').innerText = "מחובר! שלח קוד מהמחשב...";
                connectBtn.style.display = 'none';

                const endpoint = 2; 
                while (true) {
                    const result = await device.transferIn(endpoint, 64);
                    const bytes = new Uint8Array(result.data.buffer);
                    
                    // מציג את רשימת הבייטים כפי שהם מגיעים
                    debugBox.innerText = Array.from(bytes).join(", ");
                }
            } catch (err) {
                debugBox.innerText = "שגיאה: " + err.message;
            }
        });
    </script>
</body>
</html>
