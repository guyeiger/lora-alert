<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRa Scanner</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: sans-serif; transition: background 0.5s; 
            background-color: #2c3e50; color: white; text-align: center;
        }
        #status-text { font-size: 2.5rem; font-weight: bold; }
        #log { margin-top: 20px; font-family: monospace; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; min-width: 200px; }
        button { padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; border: none; background: white; color: #2c3e50; }
    </style>
</head>
<body>

    <div id="status-text">ממתין לחיבור...</div>
    <button id="connectBtn">התחבר למקלט</button>
    <div id="log">לוג: ממתין לנתונים...</div>

    <script>
        const statusText = document.getElementById('status-text');
        const connectBtn = document.getElementById('connectBtn');
        const logDiv = document.getElementById('log');
        const body = document.body;

        connectBtn.addEventListener('click', async () => {
            try {
                const device = await navigator.usb.requestDevice({ filters: [] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                statusText.innerText = "מחובר! סורק צינורות...";
                body.style.backgroundColor = "#27ae60";
                connectBtn.style.display = 'none';

                // ניסיון לקרוא מכל הצינורות האפשריים (1 עד 5)
                [1, 2, 3, 4, 5].forEach(ep => startReading(device, ep));

            } catch (err) {
                statusText.innerText = "שגיאה: " + err.message;
            }
        });

        async function startReading(device, endpoint) {
            while (true) {
                try {
                    const result = await device.transferIn(endpoint, 64);
                    const text = new TextDecoder().decode(result.data).trim();
                    
                    if (text) {
                        logDiv.innerText = `מצאתי נתונים בצינור ${endpoint}: ${text}`;
                        handleSignal(text);
                    }
                } catch (err) {
                    // אם הצינור לא קיים או חסום, הלופ ייעצר
                    break;
                }
            }
        }

        function handleSignal(code) {
            if (code.includes('2')) {
                body.style.backgroundColor = "#c0392b";
                statusText.innerText = "אזעקה!";
            } else if (code.includes('1')) {
                body.style.backgroundColor = "#f39c12";
                statusText.innerText = "התרעה צפויה";
            } else if (code.includes('0') || code.includes('3')) {
                body.style.backgroundColor = "#27ae60";
                statusText.innerText = "שגרה";
            }
        }
    </script>
</body>
</html>
