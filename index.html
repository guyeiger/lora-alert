<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת התרעה LoRa - מבצעי</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            transition: background 0.8s; background-color: #2c3e50; color: white; text-align: center;
        }
        #status-text { font-size: 3.5rem; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        #sub-text { font-size: 1.5rem; margin-top: 10px; opacity: 0.9; }
        button { 
            padding: 20px 60px; font-size: 1.5rem; cursor: pointer; border-radius: 50px; 
            border: none; background: white; color: #2c3e50; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="status-text">מערכת מוכנה</div>
    <div id="sub-text">יש לחבר מקלט וללחוץ על הכפתור</div>
    <br>
    <button id="connectBtn">התחבר למקלט</button>

    <script>
        const statusText = document.getElementById('status-text');
        const subText = document.getElementById('sub-text');
        const connectBtn = document.getElementById('connectBtn');
        const body = document.body;

        connectBtn.addEventListener('click', async () => {
            try {
                const device = await navigator.usb.requestDevice({ filters: [] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                connectBtn.style.display = 'none';
                updateUI('0'); // התחלה במצב שגרה
                
                startReading(device);
            } catch (err) {
                statusText.innerText = "שגיאה בחיבור";
                subText.innerText = err.message;
            }
        });

        async function startReading(device) {
            const endpoint = 2; 
            while (true) {
                try {
                    const result = await device.transferIn(endpoint, 64);
                    const bytes = Array.from(new Uint8Array(result.data.buffer));
                    
                    // זיהוי לפי הביטים שגילינו (248 תמיד מופיע, נבדוק את המספר השני)
                    if (bytes.includes(24)) updateUI('2');      // אזעקה
                    else if (bytes.includes(6)) updateUI('1');  // התרעה
                    else if (bytes.includes(30)) updateUI('3'); // סיום
                    else if (bytes.includes(0)) updateUI('0');  // שגרה
                    
                } catch (err) {
                    statusText.innerText = "החיבור נותק";
                    break;
                }
            }
        }

        function updateUI(state) {
            switch(state) {
                case '2': // אזעקה
                    body.style.backgroundColor = "#c0392b";
                    statusText.innerText = "אזעקה!";
                    subText.innerText = "היכנס למרחב מוגן באופן מיידי";
                    break;
                case '1': // התרעה
                    body.style.backgroundColor = "#d35400";
                    statusText.innerText = "התרעה צפויה";
                    subText.innerText = "יש להישאר בקרבת מרחב מוגן";
                    break;
                case '3': // סיום
                    body.style.backgroundColor = "#2980b9";
                    statusText.innerText = "חזרה לשגרה";
                    subText.innerText = "ניתן לצאת מהמרחב המוגן";
                    break;
                case '0': // שגרה
                    body.style.backgroundColor = "#27ae60";
                    statusText.innerText = "שגרה";
                    subText.innerText = "המערכת סורקת וממתינה";
                    break;
            }
        }
    </script>
</body>
</html>
